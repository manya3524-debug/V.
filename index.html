                        <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Incoming Call Request 📞</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fffaf4;
    font-family:'Comic Sans MS',cursive;
    overflow:hidden;
}

.container{
    text-align:center;
    max-width:500px;
}

.penguin{
    font-size:90px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

.card{
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    color:#444;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:16px;
    cursor:pointer;
}

.yes{
    background:#b8f2e6;
}

.maybe{
    background:#ffe5b4;
}

#message{
    margin-top:20px;
    font-size:18px;
    color:#555;
    min-height:60px;
}
</style>
</head>

<body>

<div class="container">

<div class="penguin">🐧</div>

<div class="card">

<h1>Official Penguin Request</h1>

<p>
The penguin would like to speak to the avocado.
</p>

<p>
No fights.<br>
No serious discussions.<br>
Just one tiny call.
</p>

<button class="yes" onclick="yes()">📞 Fine, call me</button>
<button class="maybe" onclick="maybe()">🥑 Let me think</button>

<div id="message"></div>

</div>
</div>

<script>

function yes(){
document.getElementById("message").innerHTML=
"🐧 Mission Successful.<br><br>The penguin is now waiting near the phone pretending not to be excited.";
}

function maybe(){
const msgs=[
"🐧 Application moved from 'Rejected' to 'Under Review'.",
"🐧 Penguin has decided to wait dramatically.",
"🐧 Avocado response detected. Hope restored.",
"🐧 Small progress is still progress."
];

document.getElementById("message").innerHTML=
msgs[Math.floor(Math.random()*msgs.length)];
}

</script>

</body>
</html>
