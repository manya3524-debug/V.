                    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Request For Zyaan 📞</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fff5f7,#fff8eb,#f2fff8);
overflow:hidden;
position:relative;
padding:20px;
}

.floating{
position:absolute;
font-size:28px;
animation:float 8s linear infinite;
opacity:.7;
}

.f1{left:8%; animation-delay:0s;}
.f2{left:25%; animation-delay:2s;}
.f3{left:45%; animation-delay:4s;}
.f4{left:70%; animation-delay:1s;}
.f5{left:88%; animation-delay:3s;}

@keyframes float{
0%{
transform:translateY(100vh) rotate(0deg);
}
100%{
transform:translateY(-120vh) rotate(360deg);
}
}

.container{
width:100%;
max-width:430px;
text-align:center;
position:relative;
}

.teddy{
font-size:90px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-12px);
}
}

.card{
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);
padding:28px;
border-radius:35px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
margin-top:-10px;
}

.badge{
display:inline-block;
background:#fff2b2;
padding:8px 16px;
border-radius:999px;
font-size:13px;
font-weight:700;
margin-bottom:12px;
}

h1{
font-family:'Pacifico',cursive;
font-size:34px;
color:#333;
margin-bottom:15px;
}

.note{
background:#fffaf3;
border:2px dashed #ffc7d4;
border-radius:20px;
padding:18px;
line-height:1.8;
font-size:15px;
color:#444;
}

.phone{
font-size:55px;
margin:15px 0;
animation:ring 1.3s infinite;
}

@keyframes ring{
0%,100%{transform:rotate(0deg);}
20%{transform:rotate(12deg);}
40%{transform:rotate(-12deg);}
60%{transform:rotate(8deg);}
80%{transform:rotate(-8deg);}
}

.buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

button{
border:none;
padding:14px 18px;
border-radius:18px;
font-size:14px;
font-weight:700;
cursor:pointer;
transition:.2s;
box-shadow:0 8px 18px rgba(0,0,0,.12);
}

button:hover{
transform:scale(1.05);
}

.yes{
background:#baf7d8;
}

.maybe{
background:#ffe39f;
}

.no{
background:#ffd2dd;
}

#reply{
margin-top:18px;
min-height:90px;
}

.mini-card{
background:#fff9ef;
border:2px dashed #ffc7d4;
padding:16px;
border-radius:18px;
animation:pop .3s ease;
font-weight:600;
color:#444;
line-height:1.7;
}

@keyframes pop{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.nextBtn{
background:#ffd9e8;
margin-top:12px;
}

.footer{
margin-top:15px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<div class="floating f1">💗</div>
<div class="floating f2">✨</div>
<div class="floating f3">🌸</div>
<div class="floating f4">💌</div>
<div class="floating f5">📞</div>

<div class="container">

<div class="teddy">🧸</div>

<div class="card">

<div class="badge">
Very Important Matter
</div>

<h1>Hi Zyaan</h1>

<div class="note">
Manya would like to submit an official request for one tiny call.
<br><br>
No fights.
<br>
No drama.
<br>
No serious discussions.
<br>
Just a little conversation and maybe a smile.
</div>

<div class="phone">📞</div>

<div class="buttons">

<button class="yes" onclick="yesReply()">Approve Call</button>
<button class="maybe" onclick="maybeReply()">Maybe</button>
<button class="no" id="noBtn" onclick="moveNo()">Reject?</button>


</div>
  <div id="reply"></div>

<div class="footer">
Current Status: Manya waiting respectfully 📞
</div>

</div>
</div>
  <script>

const cards = [

"🥺 Zyaan please, just 5 minutes?",

"🌸 I promise no fighting.",

"📞 We can literally talk about anything.",

"✨ Even silence counts as quality conversation.",

"🥺 This is Manya asking very politely.",

"🌙 I miss talking to you.",

"💗 One tiny call won't hurt.",

"📞 Application still waiting for approval...",

"🥺 Pretty please?",

"✨ Final request before I run out of reasons."

];

let currentCard = 0;

function yesReply(){

document.getElementById("reply").innerHTML =

`
<div class="mini-card">

<h2>📞 Incoming Call</h2>

<br>

💗 Zyaan is being summoned...

<br><br>

Manya is waiting.

<br><br>

<button onclick="callConnected()">
Answer Call ❤️
</button>

</div>
`;

}

function callConnected(){

document.getElementById("reply").innerHTML =

`
<div class="mini-card">

📞 Call Connected

<br><br>

💗 Congratulations.

<br><br>

You have successfully unlocked:

<br><br>

✨ Random conversations<br>
✨ Bakwas<br>
✨ Memes<br>
✨ Refusing to hang up

<br><br>

❤️ Thank you for approving the application.

</div>
`;

}

function maybeReply(){

const reply = document.getElementById("reply");

if(currentCard < cards.length){

reply.innerHTML =

`
<div class="mini-card">

${cards[currentCard]}

<br><br>

<button class="nextBtn" onclick="maybeReply()">
Next Reason →
</button>

</div>
`;

currentCard++;

}else{

reply.innerHTML =

`
<div class="mini-card">

🎉 Final Stage Reached

<br><br>

Dear Zyaan,

<br><br>

Can Manya have one tiny call?

<br><br>

💗

</div>
`;

currentCard = 0;

}

}

function moveNo(){

const btn = document.getElementById("noBtn");

btn.style.position = "relative";
btn.style.left = (Math.random()*120-60) + "px";
btn.style.top = (Math.random()*80-40) + "px";

}

  </script>
</body>
